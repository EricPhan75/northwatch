# ---------------------------------------------------------------------------
# TECH — general tech press. GATED. These are firehoses.
#
# Every item here must clear the cyber-relevance score or it is dropped on the
# floor. Phone reviews, Prime Day deals, and "best headphones of 2026" never
# reach you. Stories about a Chrome zero-day, an encryption law, or a platform
# breach do.
# ---------------------------------------------------------------------------
tech:
  - id: verge
    name: The Verge
    url: https://www.theverge.com/rss/index.xml
    site: theverge.com
    gate: true
    weight: 1.2
    verified: false

  - id: techcrunch
    name: TechCrunch
    url: https://techcrunch.com/feed/
    site: techcrunch.com
    gate: true
    weight: 1.1
    verified: false

  - id: ars
    name: Ars Technica
    url: https://feeds.arstechnica.com/arstechnica/index
    site: arstechnica.com
    gate: true
    weight: 1.2
    verified: false

  - id: engadget
    name: Engadget
    url: https://www.engadget.com/rss.xml
    site: engadget.com
    gate: true
    weight: 0.9
    verified: false

  - id: register
    name: The Register
    url: https://www.theregister.com/headlines.atom
    site: theregister.com
    gate: true
    weight: 1.1
    verified: false

  - id: wired
    name: WIRED
