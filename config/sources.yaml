# NORTHWATCH source registry
#
# verified: true  = URL confirmed live during build (Jul 2026)
# verified: false = best-known-good, NOT confirmed. `nw doctor` validates.
#
# gate: true      = general-interest firehose. Items must clear the cyber-relevance
#                   score in pipeline.py before they're admitted. Without this, The
#                   Verge alone buries the feed in phone reviews.
# gate: false     = already security-scoped. Everything gets in.
#
# canada: true    = tags the item for the Canada filter. It is only a filter now,
#                   not a tier and not a scoring bonus.

defaults:
  timeout: 20
  max_items_per_feed: 40
  user_agent: "northwatch/2.0 (+https://github.com/YOURUSER/northwatch)"
  relevance_threshold: 3      # tune this after you see a real day of output

# ---------------------------------------------------------------------------
# SECURITY — the security press. The spine of the feed.
# ---------------------------------------------------------------------------
security:
